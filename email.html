<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>邮件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            font-family: "Segoe UI Variable Display", "Microsoft YaHei", sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%; height: 100%;
        }

        /* ── 左侧邮件列表 ── */
        .mail-list {
            width: 320px;
            min-width: 280px;
            max-width: 400px;
            height: 100%;
            background: #222;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .mail-list-header {
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mail-title-group {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .mail-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mail-action-btn {
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: #bbb;
            border-radius: 6px;
            padding: 3px 7px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .mail-action-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: rgba(255,255,255,0.2);
        }

        .mail-action-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .mail-count {
            font-size: 12px;
            font-weight: 400;
            color: #666;
        }

        .mail-list-items {
            flex: 1;
            overflow-y: auto;
        }

        .mail-item {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            transition: background 0.15s;
            min-height: 72px;
        }
        .mail-item:hover {
            background: rgba(255,255,255,0.06);
        }
        .mail-item.active {
            background: rgba(100,160,255,0.12);
            border-left: 3px solid #5b9df0;
        }

        .mail-item-from {
            font-size: 13px;
            font-weight: 600;
            color: #ddd;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mail-item-subject {
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mail-item-date {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        /* ── 占位骨架 ── */
        .mail-item.placeholder .mail-item-from,
        .mail-item.placeholder .mail-item-subject,
        .mail-item.placeholder .mail-item-date {
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            color: transparent;
            animation: shimmer 1.5s infinite;
        }
        .mail-item.placeholder .mail-item-from { width: 55%; height: 14px; }
        .mail-item.placeholder .mail-item-subject { width: 80%; height: 14px; margin-top: 4px; }
        .mail-item.placeholder .mail-item-date { width: 35%; height: 12px; }

        @keyframes shimmer {
            0%   { opacity: 0.4; }
            50%  { opacity: 0.8; }
            100% { opacity: 0.4; }
        }

        /* ── 右侧邮件内容 ── */
        .mail-content {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            overflow: hidden;
        }

        .mail-content-header {
            padding: 18px 24px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .mail-content-subject {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .mail-content-meta {
            font-size: 12px;
            color: #888;
        }

        .mail-content-body {
            flex: 1;
            overflow: hidden;
        }

        .mail-content-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #555;
            font-size: 14px;
        }

        .loading-body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            font-size: 14px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="mail-list">
            <div class="mail-list-header">
                <div class="mail-title-group">
                    <span>收件箱</span>
                    <div class="mail-actions">
                        <button class="mail-action-btn" id="refresh-btn">刷新</button>
                        <button class="mail-action-btn" id="clear-cache-btn">清空缓存</button>
                    </div>
                </div>
                <span class="mail-count" id="mail-count"></span>
            </div>
            <div class="mail-list-items" id="mail-list-items">
                <!-- 邮件列表项由 JS 动态渲染 -->
            </div>
        </div>
        <div class="mail-content" id="mail-content">
            <div class="empty-state">选择一封邮件查看详情</div>
        </div>
    </div>

    <script type="module">
        import { invoke } from "@tauri-apps/api/core";
        import { convertFileSrc } from "@tauri-apps/api/core";
        import { listen } from "@tauri-apps/api/event";

        const listEl = document.getElementById("mail-list-items");
        const contentEl = document.getElementById("mail-content");
        const countEl = document.getElementById("mail-count");
        const refreshBtn = document.getElementById("refresh-btn");
        const clearCacheBtn = document.getElementById("clear-cache-btn");

        let cacheDir = "";
        let activeUid = null;
        let pendingOpenUid = new URLSearchParams(window.location.search).get("uid");

        // 全量 UID 列表（新→旧），由 fetch_email_uid_list 获取
        let allUids = [];
        // 已获取元数据的邮件缓存 { uid: EmailMeta }
        const metaCache = new Map();
        // 正在请求元数据的 UID 集合（防重复请求）
        const metaLoading = new Set();

        // 前 10 封邮件的缓存元数据（启动时从后端获取）
        let cachedMetas = [];

        function esc(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function setActionButtonsDisabled(disabled) {
            refreshBtn.disabled = disabled;
            clearCacheBtn.disabled = disabled;
        }

        // 渲染完整的列表：为每个 UID 创建一个 DOM 节点
        function renderFullList() {
            listEl.innerHTML = "";
            if (allUids.length === 0) {
                listEl.innerHTML = '<div class="empty-state">暂无邮件</div>';
                countEl.textContent = "";
                return;
            }
            countEl.textContent = `${allUids.length} 封`;
            for (const uid of allUids) {
                const div = document.createElement("div");
                div.dataset.uid = uid;
                const meta = metaCache.get(String(uid));
                if (meta) {
                    div.className = "mail-item" + (String(uid) === activeUid ? " active" : "");
                    div.innerHTML = `
                        <div class="mail-item-from">${esc(meta.from || "(未知发件人)")}</div>
                        <div class="mail-item-subject">${esc(meta.subject || "(无主题)")}</div>
                        <div class="mail-item-date">${esc(meta.date || "")}</div>
                    `;
                    div.onclick = () => selectMail(meta);
                } else {
                    // 占位骨架
                    div.className = "mail-item placeholder";
                    div.innerHTML = `
                        <div class="mail-item-from">&nbsp;</div>
                        <div class="mail-item-subject">&nbsp;</div>
                        <div class="mail-item-date">&nbsp;</div>
                    `;
                }
                listEl.appendChild(div);
            }
            // 启动 IntersectionObserver 观察占位项
            observePlaceholders();
        }

        // 只更新单个邮件项 DOM（不重建全部列表）
        function updateItemDom(uid) {
            const el = listEl.querySelector(`[data-uid="${uid}"]`);
            if (!el) return;
            const meta = metaCache.get(String(uid));
            if (!meta) return;
            el.className = "mail-item" + (String(uid) === activeUid ? " active" : "");
            el.innerHTML = `
                <div class="mail-item-from">${esc(meta.from || "(未知发件人)")}</div>
                <div class="mail-item-subject">${esc(meta.subject || "(无主题)")}</div>
                <div class="mail-item-date">${esc(meta.date || "")}</div>
            `;
            el.onclick = () => selectMail(meta);
        }

        async function openUid(uid) {
            const uidStr = String(uid);
            const cachedMeta = metaCache.get(uidStr);
            if (cachedMeta) {
                selectMail(cachedMeta);
                return true;
            }

            const uidNum = Number(uidStr);
            if (!Number.isFinite(uidNum)) return false;

            try {
                const metas = await invoke("fetch_email_metas_by_uids", { uids: [uidNum] });
                const meta = metas && metas[0];
                if (!meta) return false;
                metaCache.set(meta.uid, meta);
                if (!allUids.map(String).includes(String(meta.uid))) {
                    allUids.unshift(uidNum);
                    renderFullList();
                } else {
                    updateItemDom(meta.uid);
                }
                selectMail(meta);
                return true;
            } catch (e) {
                console.error("open uid failed:", e);
                return false;
            }
        }

        // IntersectionObserver：当占位项进入视口时批量加载元数据
        let observer = null;
        const BATCH_SIZE = 30; // 每批加载数量
        let pendingBatch = [];
        let batchTimer = null;

        function observePlaceholders() {
            if (observer) observer.disconnect();
            observer = new IntersectionObserver((entries) => {
                for (const entry of entries) {
                    if (!entry.isIntersecting) continue;
                    const uid = Number(entry.target.dataset.uid);
                    if (metaCache.has(String(uid)) || metaLoading.has(uid)) continue;
                    pendingBatch.push(uid);
                    observer.unobserve(entry.target);
                }
                if (pendingBatch.length > 0) {
                    scheduleBatchFetch();
                }
            }, {
                root: listEl,
                rootMargin: "900px 0px", // 提前预加载更多列表项
            });

            // 只观察占位项
            for (const el of listEl.querySelectorAll(".mail-item.placeholder")) {
                observer.observe(el);
            }
        }

        function scheduleBatchFetch() {
            if (batchTimer) return;
            batchTimer = setTimeout(() => {
                batchTimer = null;
                const batch = pendingBatch.splice(0, BATCH_SIZE);
                if (batch.length > 0) {
                    fetchMetasBatch(batch);
                }
                // 如果还有剩余，继续调度
                if (pendingBatch.length > 0) {
                    scheduleBatchFetch();
                }
            }, 10);
        }

        async function fetchMetasBatch(uids) {
            for (const uid of uids) metaLoading.add(uid);
            try {
                const metas = await invoke("fetch_email_metas_by_uids", { uids });
                for (const m of metas) {
                    metaCache.set(m.uid, m);
                    updateItemDom(m.uid);
                }
                for (const uid of uids) metaLoading.delete(uid);
            } catch (e) {
                console.error("fetch metas batch failed:", e);
                for (const uid of uids) metaLoading.delete(uid);
            }
        }

        async function selectMail(meta) {
            activeUid = meta.uid;
            // 更新列表高亮
            for (const el of listEl.querySelectorAll(".mail-item")) {
                el.classList.toggle("active", el.dataset.uid === activeUid);
            }

            // 先显示 header + loading
            contentEl.innerHTML = `
                <div class="mail-content-header">
                    <div class="mail-content-subject">${esc(meta.subject || "(无主题)")}</div>
                    <div class="mail-content-meta">${esc(meta.from || "")} · ${esc(meta.date || "")}</div>
                </div>
                <div class="mail-content-body">
                    <div class="loading-body">加载邮件内容中...</div>
                </div>
            `;

            // 按需获取邮件正文
            try {
                await invoke("fetch_email_body_by_uid", { uid: Number(meta.uid) });
                // 获取成功，显示 iframe
                if (activeUid !== meta.uid) return; // 用户可能已切换
                const filePath = cacheDir + "\\" + meta.uid + ".html";
                const src = convertFileSrc(filePath);
                contentEl.innerHTML = `
                    <div class="mail-content-header">
                        <div class="mail-content-subject">${esc(meta.subject || "(无主题)")}</div>
                        <div class="mail-content-meta">${esc(meta.from || "")} · ${esc(meta.date || "")}</div>
                    </div>
                    <div class="mail-content-body">
                        <iframe src="${src}" sandbox="allow-same-origin"></iframe>
                    </div>
                `;
            } catch (e) {
                console.error("fetch email body failed:", e);
                if (activeUid !== meta.uid) return;
                contentEl.querySelector(".mail-content-body").innerHTML =
                    '<div class="empty-state">邮件内容加载失败</div>';
            }
        }

        async function loadMailboxList(warmup = true) {
            try {
                allUids = await invoke("fetch_email_uid_list");
            } catch (e) {
                console.warn("fetch uid list failed, falling back to cached:", e);
                allUids = cachedMetas.map(m => Number(m.uid));
            }

            renderFullList();

            if (!warmup) return;
            const warmupUids = allUids
                .slice(0, 60)
                .filter(uid => !metaCache.has(String(uid)));
            if (warmupUids.length > 0) {
                fetchMetasBatch(warmupUids);
            }
        }

        async function init() {
            try {
                cacheDir = await invoke("get_email_cache_dir");

                // 1. 先加载已缓存的前 10 封元数据（冷启动快速显示）
                cachedMetas = await invoke("fetch_emails");
                for (const m of cachedMetas) {
                    metaCache.set(m.uid, m);
                }

                if (pendingOpenUid) {
                    const opened = await openUid(pendingOpenUid);
                    pendingOpenUid = null;
                    loadMailboxList(false);
                    if (opened) return;
                }

                await loadMailboxList();

                // 自动选中第一封
                if (allUids.length > 0 && !activeUid) {
                    const firstUid = String(allUids[0]);
                    const firstMeta = metaCache.get(firstUid);
                    if (firstMeta) {
                        selectMail(firstMeta);
                    }
                }
            } catch (e) {
                console.error("init failed:", e);
                listEl.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        async function refreshMailbox() {
            setActionButtonsDisabled(true);
            const oldText = refreshBtn.textContent;
            refreshBtn.textContent = "刷新中";
            try {
                cachedMetas = await invoke("refresh_emails");
                for (const m of cachedMetas) {
                    metaCache.set(m.uid, m);
                }
                try {
                    allUids = await invoke("fetch_email_uid_list");
                } catch (e) {
                    console.warn("fetch uid list failed after refresh:", e);
                    allUids = cachedMetas.map(m => Number(m.uid));
                }
                if (activeUid && !allUids.map(String).includes(activeUid)) {
                    activeUid = null;
                    contentEl.innerHTML = '<div class="empty-state">选择一封邮件查看详情</div>';
                }
                renderFullList();
            } catch (e) {
                console.error("refresh mailbox failed:", e);
            } finally {
                refreshBtn.textContent = oldText;
                setActionButtonsDisabled(false);
            }
        }

        async function clearCache() {
            setActionButtonsDisabled(true);
            const oldText = clearCacheBtn.textContent;
            clearCacheBtn.textContent = "清理中";
            try {
                await invoke("clear_email_cache");
                activeUid = null;
                cachedMetas = [];
                metaCache.clear();
                metaLoading.clear();
                pendingBatch = [];
                contentEl.innerHTML = '<div class="empty-state">选择一封邮件查看详情</div>';
                renderFullList();
            } catch (e) {
                console.error("clear email cache failed:", e);
            } finally {
                clearCacheBtn.textContent = oldText;
                setActionButtonsDisabled(false);
            }
        }

        refreshBtn.addEventListener("click", () => {
            refreshMailbox();
        });

        clearCacheBtn.addEventListener("click", () => {
            clearCache();
        });

        // 后台轮询推送新邮件时刷新
        listen("email-updated", async () => {
            // 重新加载缓存元数据
            try {
                cachedMetas = await invoke("fetch_emails");
                for (const m of cachedMetas) {
                    metaCache.set(m.uid, m);
                }
            } catch {}

            // 重新获取 UID 列表
            try {
                const newUids = await invoke("fetch_email_uid_list");
                allUids = newUids;
            } catch {}

            renderFullList();
        });

        listen("email-open-uid", async (event) => {
            await openUid(event.payload);
        });

        // 启动
        init();
    </script>
</body>
</html>
