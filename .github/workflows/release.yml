name: Release Tauri App

on:
  push:
    tags:
      - 'tauri-v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dynamic-island/src-tauri

      - name: Install frontend dependencies
        working-directory: dynamic-island
        run: npm ci

      - name: Build Tauri app
        working-directory: dynamic-island
        run: npm run tauri build

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#tauri-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "[Tauri] v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🎉 Dynamic Island for Windows - Tauri v${{ steps.version.outputs.VERSION }}

            ### 📦 安装说明
            - 下载 `.exe` 安装包（推荐）或 `.msi` 安装包
            - 运行安装程序完成安装
          files: |
            dynamic-island/src-tauri/target/release/bundle/nsis/*.exe
            dynamic-island/src-tauri/target/release/bundle/msi/*.msi
          make_latest: true
          draft: false
          prerelease: false
